name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
            target: linux-amd64
          - os: ubuntu-24.04-arm
            arch: arm64
            target: linux-arm64
          - os: macos-15
            arch: arm64
            target: darwin-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Linux: static build via Alpine Docker
      - name: Build static binary (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          mkdir -p bin
          docker run --rm -v "$PWD":/app -w /app crystallang/crystal:1.19.1-alpine \
            crystal build src/easy_ffmpeg_cli.cr -o bin/easy-ffmpeg --release --no-debug --static

      # macOS: native build
      - name: Install Crystal (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: "1.19.1"

      - name: Build binary (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          mkdir -p bin
          crystal build src/easy_ffmpeg_cli.cr -o bin/easy-ffmpeg --release --no-debug

      - name: Smoke test binary
        run: |
          test -x bin/easy-ffmpeg
          bin/easy-ffmpeg --version | grep -F "easy-ffmpeg "

      - name: Rename binary
        run: mv bin/easy-ffmpeg bin/easy-ffmpeg-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: easy-ffmpeg-${{ matrix.target }}
          path: bin/easy-ffmpeg-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x artifacts/*

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > ../checksums.txt
          mv ../checksums.txt SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_DARWIN_ARM64=$(grep 'easy-ffmpeg-darwin-arm64' artifacts/SHA256SUMS.txt | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep 'easy-ffmpeg-linux-amd64' artifacts/SHA256SUMS.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep 'easy-ffmpeg-linux-arm64' artifacts/SHA256SUMS.txt | awk '{print $1}')

          cat > /tmp/easy-ffmpeg.rb << FORMULA
          class EasyFfmpeg < Formula
            desc "Smart CLI wrapper around ffmpeg for video conversion and remuxing"
            homepage "https://github.com/akitaonrails/easy-ffmpeg"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/akitaonrails/easy-ffmpeg/releases/download/v#{version}/easy-ffmpeg-darwin-arm64",
                    using: CurlDownloadStrategy
                sha256 "${SHA_DARWIN_ARM64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/akitaonrails/easy-ffmpeg/releases/download/v#{version}/easy-ffmpeg-linux-amd64",
                    using: CurlDownloadStrategy
                sha256 "${SHA_LINUX_AMD64}"
              end

              on_arm do
                url "https://github.com/akitaonrails/easy-ffmpeg/releases/download/v#{version}/easy-ffmpeg-linux-arm64",
                    using: CurlDownloadStrategy
                sha256 "${SHA_LINUX_ARM64}"
              end
            end

            depends_on "ffmpeg"

            def install
              bin.install Dir.glob("easy-ffmpeg*").first => "easy-ffmpeg"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/easy-ffmpeg --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/easy-ffmpeg.rb

          # Push to homebrew-tap repo via GitHub API
          CONTENT=$(base64 -w 0 /tmp/easy-ffmpeg.rb)

          # Get current file SHA (if it exists)
          FILE_SHA=$(curl -s -H "Authorization: token ${HOMEBREW_TAP_TOKEN}" \
            "https://api.github.com/repos/akitaonrails/homebrew-tap/contents/Formula/easy-ffmpeg.rb" \
            | jq -r '.sha // empty')

          SHA_PARAM=""
          if [ -n "$FILE_SHA" ]; then
            SHA_PARAM=", \"sha\": \"${FILE_SHA}\""
          fi

          curl -s -X PUT \
            -H "Authorization: token ${HOMEBREW_TAP_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/akitaonrails/homebrew-tap/contents/Formula/easy-ffmpeg.rb" \
            -d "{\"message\": \"Update easy-ffmpeg to ${VERSION}\", \"content\": \"${CONTENT}\"${SHA_PARAM}}"
